<div class="cursor-glow" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <span class="logo">🐉</span>
    <div class="brand-text">
      <strong>Ember &amp; Scale</strong>
      <small>Generative UI demo · Angular 22 + OpenUI</small>
    </div>
  </div>
  <div class="topbar-actions">
    <label class="provider-select" [title]="selectedProviderHint()">
      <span class="provider-select-label">AI</span>
      <select [ngModel]="provider.selected()" (ngModelChange)="provider.select($event)">
        @for (opt of provider.options; track opt.id) {
          <option [value]="opt.id">{{ opt.label }}</option>
        }
      </select>
    </label>
    <a class="repo-link" href="https://www.openui.com/docs/openui-lang" target="_blank" rel="noreferrer">
      OpenUI Lang ↗
    </a>
  </div>
</header>

<main class="stage">
  <app-chat />
</main>
